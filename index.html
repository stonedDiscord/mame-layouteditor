<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAME Layout Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── variables ── */
    :root {
      --bg:       #0c0d11;
      --panel:    #13151c;
      --panel2:   #191c26;
      --border:   #272a38;
      --border2:  #1e2130;
      --accent:   #d4f74e;   /* sharp yellow-green */
      --accent2:  #4de8ff;   /* cyan */
      --accent3:  #ff6b4a;   /* red-orange */
      --purple:   #b48cff;
      --gold:     #ffc84a;
      --text:     #dde0ee;
      --text2:    #6a6f88;
      --text3:    #3a3f55;
      --font-ui:  'IBM Plex Sans',  sans-serif;
      --font-mono:'IBM Plex Mono', monospace;
      --r:        4px;
    }

    /* ── reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-rows: 44px 1fr;
      grid-template-columns: 230px 1fr 270px;
      grid-template-areas:
        "hdr hdr hdr"
        "lft cvs rgt";
    }

    /* ── header ── */
    header {
      grid-area: hdr;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 16px;
    }
    .logo {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .logo em { color: var(--text2); font-style: normal; font-weight: 400; }
    .hdr-actions { margin-left: auto; display: flex; gap: 6px; }

    /* ── buttons ── */
    button {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      cursor: pointer;
      border: none;
      border-radius: var(--r);
      padding: 5px 12px;
      transition: background .12s, color .12s, border-color .12s;
      outline: none;
    }
    .btn         { padding: 5px 12px; }
    .btn-ghost   { background: transparent; border: 1px solid var(--border); color: var(--text2); }
    .btn-ghost:hover   { border-color: var(--accent); color: var(--accent); }
    .btn-primary { background: var(--accent); color: #0c0d11; }
    .btn-primary:hover { background: #fff; }
    .btn-danger  { background: transparent; border: 1px solid var(--border); color: var(--accent3); }
    .btn-danger:hover  { border-color: var(--accent3); background: rgba(255,107,74,.09); }
    .btn-copy { background: var(--panel2); border: 1px solid var(--border); color: var(--text); }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
    .full { width: 100%; }

    .btn-icon {
      width: 26px; height: 26px; padding: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      background: var(--panel2);
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: var(--r);
    }
    .btn-icon:hover { border-color: var(--accent); color: var(--accent); }
    .btn-icon.sm    { width: 20px; height: 20px; font-size: 10px; }
    .btn-icon.danger:hover { border-color: var(--accent3); color: var(--accent3); }

    /* ── left panel ── */
    .panel-left {
      grid-area: lft;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .pane-header {
      padding: 7px 12px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--text2);
      border-bottom: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .pane-section { border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .pane-scroll  { flex: 1; overflow-y: auto; }

    /* palette */
    .palette-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      padding: 8px;
    }
    .palette-item {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 8px 4px 6px;
      text-align: center;
      cursor: grab;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text2);
      transition: border-color .12s, color .12s, background .12s;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .palette-item:hover   { border-color: var(--accent); color: var(--accent); background: rgba(212,247,78,.04); }
    .palette-item:active  { cursor: grabbing; }
    .palette-item .icon   { font-size: 17px; }

    /* views list */
    .views-list { padding: 5px 7px; display: flex; flex-direction: column; gap: 3px; max-height: 120px; overflow-y: auto; }
    .view-item {
      padding: 5px 8px;
      border-radius: var(--r);
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--text2);
      border: 1px solid transparent;
    }
    .view-item:hover  { background: var(--panel2); color: var(--text); }
    .view-item.active { background: rgba(212,247,78,.07); border-color: rgba(212,247,78,.25); color: var(--accent); }
    .view-actions     { display: flex; gap: 3px; opacity: 0; transition: opacity .1s; }
    .view-item:hover .view-actions { opacity: 1; }

    /* layers list */
    .layers-list { padding: 5px 7px; display: flex; flex-direction: column; gap: 2px; }
    .layer-item {
      padding: 5px 7px;
      border-radius: var(--r);
      font-size: 10px;
      font-family: var(--font-mono);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text2);
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .layer-item:hover    { background: var(--panel2); color: var(--text); }
    .layer-item.selected { background: rgba(212,247,78,.07); border-color: rgba(212,247,78,.2); color: var(--text); }
    .layer-name          { overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .badge {
      font-size: 8px;
      padding: 1px 5px;
      border-radius: 2px;
      font-weight: 700;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .type-rect    { background: rgba(77,232,255,.13); color: var(--accent2); }
    .type-disk    { background: rgba(255,107,74,.13); color: var(--accent3); }
    .type-screen  { background: rgba(212,247,78,.13); color: var(--accent); }
    .type-text    { background: rgba(180,140,255,.13); color: var(--purple); }
    .type-image   { background: rgba(255,200,74,.13); color: var(--gold); }
    .type-led7seg,
    .type-led14seg{ background: rgba(74,255,140,.13); color: #4aff8c; }
    .type-group   { background: rgba(150,150,150,.13); color: #aaa; }

    /* ── canvas area ── */
    .canvas-area {
      grid-area: cvs;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    .canvas-toolbar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 5px 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .tool-sep  { width: 1px; height: 18px; background: var(--border); margin: 0 3px; }
    .view-label { font-size: 11px; color: var(--text2); }
    .view-label strong { color: var(--accent); font-weight: 600; }
    .zoom-info { font-size: 10px; font-family: var(--font-mono); color: var(--text2); margin-left: auto; }

    .canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #mainCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      outline: none;
    }
    .empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      gap: 8px;
    }
    .empty-state .big { font-size: 42px; opacity: .1; }
    .empty-state p    { font-size: 11px; color: var(--text2); text-align: center; line-height: 1.6; }

    /* ── right panel ── */
    .panel-right {
      grid-area: rgt;
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .tab-bar { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .tab {
      flex: 1;
      padding: 8px 10px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      text-align: center;
      cursor: pointer;
      color: var(--text2);
      border-bottom: 2px solid transparent;
      transition: color .12s, border-color .12s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    #tabPropsContent { flex: 1; overflow-y: auto; padding: 10px; }
    #tabXmlContent   { flex: 1; overflow-y: auto; display: none; }
    .xml-content {
      font-family: var(--font-mono);
      font-size: 10px;
      line-height: 1.6;
      padding: 10px;
      white-space: pre;
      color: var(--text2);
    }
    .xt { color: var(--accent2); }
    .xa { color: var(--accent); }
    .xv { color: #ff9e64; }
    .xc { color: var(--text3); }

    /* ── props panel ── */
    .prop-group        { margin-bottom: 14px; }
    .prop-group-title  {
      font-size: 9px; font-weight: 700; letter-spacing: .14em;
      text-transform: uppercase; color: var(--text2);
      margin-bottom: 6px; padding-bottom: 4px;
      border-bottom: 1px solid var(--border2);
    }
    .prop-row {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 5px;
    }
    .prop-label {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text2);
      flex: 0 0 28px;
    }
    .prop-label.ml { margin-left: 4px; }
    input[type="text"],
    input[type="number"],
    select,
    textarea {
      font-family: var(--font-mono);
      font-size: 11px;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      padding: 4px 7px;
      outline: none;
      transition: border-color .12s;
    }
    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus,
    textarea:focus { border-color: var(--accent); }
    input[type="text"]   { flex: 1; min-width: 0; }
    input[type="number"] { width: 62px; }
    select               { flex: 1; }
    input[type="color"]  {
      width: 28px; height: 26px;
      padding: 1px 2px;
      border-radius: var(--r);
      background: var(--panel2);
      border: 1px solid var(--border);
      cursor: pointer;
    }
    .hex-label { font-size: 10px; font-family: var(--font-mono); color: var(--text2); }
    .type-tag  {
      font-size: 9px; padding: 2px 7px; border-radius: 3px;
      font-weight: 700; text-transform: uppercase; font-family: var(--font-mono);
    }
    .no-sel {
      font-size: 11px; color: var(--text2);
      text-align: center; padding: 20px 10px; line-height: 1.6;
    }

    /* ── modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.75);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
      backdrop-filter: blur(3px);
    }
    .modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 22px;
      width: 480px;
      max-width: 96vw;
    }
    .modal h3   { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: var(--accent); }
    .modal label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 5px; }
    .modal textarea { width: 100%; resize: vertical; min-height: 180px; display: block; }
    .modal-footer   { margin-top: 14px; display: flex; justify-content: flex-end; gap: 8px; }

    /* ── scrollbars ── */
    ::-webkit-scrollbar        { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track  { background: transparent; }
    ::-webkit-scrollbar-thumb  { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<!-- ═══════════════ HEADER ═══════════════ -->
<header>
  <div class="logo">MAME <em>/</em> Layout Editor</div>
  <div class="hdr-actions">
    <button class="btn btn-ghost"   onclick="importXML()">⬆ Import</button>
    <button class="btn btn-ghost"   onclick="exportXML()">⬇ Export .lay</button>
    <button class="btn btn-copy btn-copy" onclick="copyXML()">⧉ Copy XML</button>
  </div>
</header>

<!-- ═══════════════ LEFT PANEL ═══════════════ -->
<div class="panel-left">

  <!-- element palette -->
  <div class="pane-section">
    <div class="pane-header">Elements</div>
    <div class="palette-grid">
      <div class="palette-item" draggable="true" data-type="rect"    ondragstart="paletteDragStart(event)"><span class="icon">▬</span>Rect</div>
      <div class="palette-item" draggable="true" data-type="disk"    ondragstart="paletteDragStart(event)"><span class="icon">●</span>Disk</div>
      <div class="palette-item" draggable="true" data-type="screen"  ondragstart="paletteDragStart(event)"><span class="icon">🖥</span>Screen</div>
      <div class="palette-item" draggable="true" data-type="text"    ondragstart="paletteDragStart(event)"><span class="icon">T</span>Text</div>
      <div class="palette-item" draggable="true" data-type="image"   ondragstart="paletteDragStart(event)"><span class="icon">🖼</span>Image</div>
      <div class="palette-item" draggable="true" data-type="led7seg" ondragstart="paletteDragStart(event)"><span class="icon">7</span>LED 7seg</div>
      <div class="palette-item" draggable="true" data-type="led14seg"ondragstart="paletteDragStart(event)"><span class="icon">A</span>LED 14seg</div>
      <div class="palette-item" draggable="true" data-type="group"   ondragstart="paletteDragStart(event)"><span class="icon">⊞</span>Group</div>
    </div>
  </div>

  <!-- views -->
  <div class="pane-section">
    <div class="pane-header">
      Views
      <button class="btn-ghost btn-icon sm" style="width:auto;padding:0 8px" onclick="addView()">+ Add</button>
    </div>
    <div class="views-list" id="viewsList"></div>
  </div>

  <!-- layers -->
  <div class="pane-section pane-scroll" style="border-bottom:none">
    <div class="pane-header">
      Layers
      <button class="btn-icon sm danger" onclick="deleteSelected()" title="Delete selected">✕</button>
    </div>
    <div class="layers-list" id="layersList"></div>
  </div>

</div>

<!-- ═══════════════ CANVAS ═══════════════ -->
<div class="canvas-area">
  <div class="canvas-toolbar">
    <div style="display:flex;gap:4px">
      <button id="toolSelect" class="btn-icon" title="Select  V" onclick="setTool('select')" style="color:var(--accent);border-color:var(--accent)">↖</button>
      <button id="toolPan"    class="btn-icon" title="Pan  H"    onclick="setTool('pan')">✋</button>
    </div>
    <div class="tool-sep"></div>
    <div style="display:flex;gap:4px">
      <button class="btn-icon" title="Zoom in"  onclick="zoom(1.2)">+</button>
      <button class="btn-icon" title="Zoom out" onclick="zoom(0.83)">−</button>
      <button class="btn-icon" title="Fit  F"   onclick="fitView()">⊡</button>
    </div>
    <div class="tool-sep"></div>
    <button id="snapBtn" class="btn-icon" title="Grid snap" onclick="toggleSnap()">⊞</button>
    <span class="view-label" id="viewLabel">No view</span>
    <span class="zoom-info" id="zoomInfo">100%</span>
  </div>

  <div class="canvas-wrap" id="canvasContainer"
       ondragover="canvasDragOver(event)"
       ondrop="canvasDrop(event)">
    <canvas id="mainCanvas"></canvas>
    <div class="empty-state" id="emptyState">
      <div class="big">⊞</div>
      <p>Drag an element onto the canvas<br>or create a new view to begin.</p>
    </div>
  </div>
</div>

<!-- ═══════════════ RIGHT PANEL ═══════════════ -->
<div class="panel-right">
  <div class="tab-bar">
    <div class="tab active" id="tabProps" onclick="switchTab('props')">Properties</div>
    <div class="tab"        id="tabXml"   onclick="switchTab('xml')">XML</div>
  </div>
  <div id="tabPropsContent"></div>
  <div id="tabXmlContent">
    <div class="xml-content" id="xmlPreview"></div>
  </div>
</div>

<!-- ═══════════════ IMPORT MODAL ═══════════════ -->
<div class="modal-overlay" id="importModal" style="display:none">
  <div class="modal">
    <h3>Import Layout XML</h3>
    <label>Paste the contents of a .lay file:</label>
    <textarea id="importText" spellcheck="false" placeholder='&lt;mamelayout version="2"&gt;…&lt;/mamelayout&gt;'></textarea>
    <div class="modal-footer">
      <button class="btn btn-ghost"   onclick="closeModal('importModal')">Cancel</button>
      <button class="btn btn-primary" onclick="doImport()">Import</button>
    </div>
  </div>
</div>

</body>
</html>
